<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zabytkoza – Encyklopedia</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="sidebar-logo">
          <div class="logo-icon">🏛️</div>
          <div class="sidebar-logo-text">
            <span class="app-name">Zabytkoza</span>
            <span class="app-sub">Panel administracyjny</span>
          </div>
        </a>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Nawigacja</div>

        <a href="dashboard.html" class="nav-item" data-page="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="monuments.html" class="nav-item" data-page="monuments">
          <span class="nav-icon">🏰</span> Zabytki
        </a>
        <a href="tours.html" class="nav-item" data-page="tours">
          <span class="nav-icon">🗺️</span> Szlaki
        </a>
        <a href="facts.html" class="nav-item" data-page="facts">
          <span class="nav-icon">💡</span> Ciekawostki
        </a>
        <a href="encyclopedia.html" class="nav-item" data-page="encyclopedia">
          <span class="nav-icon">📚</span> Encyklopedia
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item btn-ghost" id="logout-side" style="width:100%">
          <span class="nav-icon">🚪</span> Wyloguj się
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
          <span class="topbar-title">Encyklopedia</span>
        </div>
        <div class="topbar-actions">
          <div class="user-badge">
            <div class="user-avatar" id="user-avatar">A</div>
            <span class="user-email" id="user-email">ładowanie…</span>
          </div>
          <button class="btn btn-secondary btn-sm" id="logout-btn">Wyloguj</button>
        </div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <div>
            <h2>Encyklopedia</h2>
            <p id="count-label">Ładowanie listy…</p>
          </div>
          <a href="add-encyclopedia.html" class="btn btn-primary">+ Dodaj artykuł</a>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>Lista artykułów</h3>
            <div class="filters-bar">
              <input
                type="search"
                class="search-input"
                id="search-input"
                placeholder="Szukaj po tytule…"
                aria-label="Szukaj"
              />
              <select class="filter-select" id="category-filter" aria-label="Filtruj po kategorii">
                <option value="">Wszystkie kategorie</option>
                <option value="Architektura">Architektura</option>
                <option value="Historia">Historia</option>
                <option value="Przyroda">Przyroda</option>
                <option value="Kultura">Kultura</option>
                <option value="Legendy">Legendy</option>
                <option value="Inne">Inne</option>
              </select>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Tytuł</th>
                  <th>Kategoria</th>
                  <th>Powiązany zabytek</th>
                  <th>Opublikowany</th>
                  <th>Akcje</th>
                </tr>
              </thead>
              <tbody id="encyclopedia-tbody">
                <tr class="loading-row">
                  <td colspan="5"><span class="spinner"></span>Ładowanie artykułów…</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/encyclopedia.js"></script>
  <script src="js/ui.js"></script>
  <script>
    let searchQuery     = '';
    let selectedCategory = '';

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderTable() {
      const filtered   = Encyclopedia.filterEntries(searchQuery, selectedCategory);
      const tbody      = document.getElementById('encyclopedia-tbody');
      const countLabel = document.getElementById('count-label');
      countLabel.textContent = `Wyświetlono ${filtered.length} rekordów`;

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Brak artykułów w bazie.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(e => {
        const category = e.category
          ? `<span class="badge badge-category">${escHtml(e.category)}</span>`
          : '<span style="color:var(--text-muted)">—</span>';
        const monument = e.monuments?.name
          ? escHtml(e.monuments.name)
          : '<span style="color:var(--text-muted)">—</span>';
        return `
          <tr id="row-${e.id}">
            <td>${escHtml(e.title || '—')}</td>
            <td>${category}</td>
            <td>${monument}</td>
            <td>
              <label class="toggle" title="${e.is_published ? 'Kliknij aby ukryć' : 'Kliknij aby opublikować'}">
                <input
                  type="checkbox"
                  ${e.is_published ? 'checked' : ''}
                  onchange="handleToggle('${e.id}', ${e.is_published})"
                />
                <span class="toggle-slider"></span>
              </label>
            </td>
            <td>
              <div class="actions-cell">
                <a href="add-encyclopedia.html?id=${e.id}" class="btn btn-secondary btn-sm" title="Edytuj">
                  ✏️ Edytuj
                </a>
                <button
                  class="btn btn-danger btn-sm"
                  onclick="handleDelete('${e.id}')"
                  title="Usuń">
                  🗑️ Usuń
                </button>
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    async function handleDelete(id) {
      try {
        const deleted = await Encyclopedia.deleteEntry(id);
        if (deleted) {
          renderTable();
          UI.showToast('Artykuł został usunięty.', 'success');
        }
      } catch (err) {
        UI.showToast(`Błąd usuwania: ${err.message}`, 'error');
      }
    }

    async function handleToggle(id, currentStatus) {
      try {
        const newStatus = await Encyclopedia.togglePublish(id, currentStatus);
        UI.showToast(newStatus ? 'Artykuł opublikowany.' : 'Artykuł ukryty.', 'success');
        renderTable();
      } catch (err) {
        UI.showToast(`Błąd zmiany statusu: ${err.message}`, 'error');
        renderTable();
      }
    }

    (async () => {
      await Auth.checkAuth();
      UI.initSidebar('encyclopedia');
      await UI.populateUserBadge();

      try {
        await Encyclopedia.loadEntries();
        renderTable();
      } catch (err) {
        UI.showToast(`Błąd pobierania artykułów: ${err.message}`, 'error');
        document.getElementById('encyclopedia-tbody').innerHTML =
          '<tr class="empty-row"><td colspan="5">Błąd ładowania danych z bazy.</td></tr>';
        document.getElementById('count-label').textContent = 'Błąd ładowania';
      }

      document.getElementById('search-input').addEventListener('input', e => {
        searchQuery = e.target.value;
        renderTable();
      });

      document.getElementById('category-filter').addEventListener('change', e => {
        selectedCategory = e.target.value;
        renderTable();
      });
    })();
  </script>
</body>
</html>
