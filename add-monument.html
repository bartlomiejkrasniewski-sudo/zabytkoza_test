<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zabytkoza – Dodaj zabytek</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="sidebar-logo">
          <div class="logo-icon">🏛️</div>
          <div class="sidebar-logo-text">
            <span class="app-name">Zabytkoza</span>
            <span class="app-sub">Panel administracyjny</span>
          </div>
        </a>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Nawigacja</div>

        <a href="dashboard.html" class="nav-item" data-page="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="monuments.html" class="nav-item" data-page="monuments">
          <span class="nav-icon">🏰</span> Zabytki
        </a>
        <a href="#" class="nav-item" onclick="alert('Moduł Szlaków – wkrótce'); return false;">
          <span class="nav-icon">🗺️</span> Szlaki
        </a>
        <a href="#" class="nav-item" onclick="alert('Encyklopedia – wkrótce'); return false;">
          <span class="nav-icon">📚</span> Encyklopedia
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item btn-ghost" id="logout-side" style="width:100%">
          <span class="nav-icon">🚪</span> Wyloguj się
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
          <span class="topbar-title" id="topbar-title">Dodaj zabytek</span>
        </div>
        <div class="topbar-actions">
          <div class="user-badge">
            <div class="user-avatar" id="user-avatar">A</div>
            <span class="user-email" id="user-email">ładowanie…</span>
          </div>
          <button class="btn btn-secondary btn-sm" id="logout-btn">Wyloguj</button>
        </div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <div>
            <h2 id="page-title">Dodaj zabytek</h2>
            <p>Wypełnij poniższe pola i zapisz rekord do bazy danych.</p>
          </div>
          <a href="monuments.html" class="btn btn-secondary">← Wróć do listy</a>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>Dane zabytku</h3>
          </div>
          <div class="card-body">
            <form id="monument-form" onsubmit="return false;">

              <!-- Nazwa -->
              <div class="form-group">
                <label for="name">Nazwa <span style="color:var(--danger-light)">*</span></label>
                <input type="text" id="name" placeholder="np. Zamek w Lidzbarku Warmińskim" />
              </div>

              <!-- Krótki opis -->
              <div class="form-group">
                <label for="short-description">
                  Krótki opis
                  <span class="char-counter" id="short-desc-counter">0/200</span>
                </label>
                <textarea id="short-description" maxlength="200" rows="3"
                  placeholder="Krótkie streszczenie widoczne na liście zabytków…"></textarea>
              </div>

              <!-- Pełny opis -->
              <div class="form-group">
                <label for="description">Pełny opis <span style="color:var(--danger-light)">*</span></label>
                <textarea id="description" rows="6"
                  placeholder="Szczegółowy opis zabytku, historia, ciekawostki…"></textarea>
              </div>

              <!-- Adres + Miasto -->
              <div class="form-grid">
                <div class="form-group">
                  <label for="address">Adres</label>
                  <input type="text" id="address" placeholder="np. ul. Zamkowa 1" />
                </div>
                <div class="form-group">
                  <label for="city">Miasto</label>
                  <input type="text" id="city" value="Olsztyn" placeholder="np. Olsztyn" />
                </div>
              </div>

              <!-- Rok budowy + Kategoria -->
              <div class="form-grid">
                <div class="form-group">
                  <label for="build-year">Rok budowy</label>
                  <input type="text" id="build-year" placeholder="np. 1350" />
                </div>
                <div class="form-group">
                  <label for="category-id">Kategoria</label>
                  <select id="category-id">
                    <option value="">— brak kategorii —</option>
                  </select>
                </div>
              </div>

              <!-- Współrzędne -->
              <div class="form-grid">
                <div class="form-group">
                  <label for="latitude">Szerokość geograficzna (latitude)</label>
                  <input type="number" id="latitude" step="0.000001"
                    placeholder="np. 54.128900" />
                </div>
                <div class="form-group">
                  <label for="longitude">Długość geograficzna (longitude)</label>
                  <input type="number" id="longitude" step="0.000001"
                    placeholder="np. 20.498500" />
                </div>
              </div>

              <!-- Opublikowany -->
              <div class="form-check">
                <input type="checkbox" id="is-published" />
                <label for="is-published">Opublikowany (widoczny w aplikacji)</label>
              </div>

              <!-- Zdjęcie główne -->
              <div class="form-group" style="margin-top:8px">
                <label for="cover-image">Zdjęcie główne</label>
                <div class="image-upload-area" id="image-upload-area">
                  <img id="cover-preview" src="" alt="Podgląd zdjęcia"
                    style="display:none; max-width:100%; max-height:300px;
                           border-radius:var(--radius); margin-bottom:12px;
                           object-fit:cover;" />
                  <label for="cover-image" class="upload-placeholder" id="upload-placeholder">
                    <span style="font-size:28px">🖼️</span>
                    <span>Kliknij aby wybrać zdjęcie</span>
                  </label>
                  <input type="file" id="cover-image" accept="image/*"
                    class="file-input-hidden" />
                  <label for="cover-image" class="btn btn-secondary btn-sm"
                    style="margin-top:8px; cursor:pointer">
                    Wybierz plik
                  </label>
                  <span id="image-filename"
                    style="font-size:12px; color:var(--text-muted); margin-left:10px"></span>
                </div>
                <p style="font-size:11px; color:var(--text-muted); margin-top:6px">
                  Zalecany rozmiar: min. 800×600 px, max 5 MB. Formaty: JPG, PNG, WebP.
                </p>
              </div>

              <!-- Akcje -->
              <div class="form-actions">
                <button class="btn btn-primary" id="save-btn" type="button">
                  Zapisz zabytek
                </button>
                <button class="btn btn-secondary" id="cancel-btn" type="button">
                  Anuluj
                </button>
              </div>

            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/add-monument.js"></script>
  <script>
    AddMonument.init();
  </script>
</body>
</html>
