<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zabytkoza – Dodaj szlak</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="sidebar-logo">
          <div class="logo-icon">🏛️</div>
          <div class="sidebar-logo-text">
            <span class="app-name">Zabytkoza</span>
            <span class="app-sub">Panel administracyjny</span>
          </div>
        </a>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Nawigacja</div>

        <a href="dashboard.html" class="nav-item" data-page="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="monuments.html" class="nav-item" data-page="monuments">
          <span class="nav-icon">🏰</span> Zabytki
        </a>
        <a href="tours.html" class="nav-item" data-page="tours">
          <span class="nav-icon">🗺️</span> Szlaki
        </a>
        <a href="#" class="nav-item" onclick="alert('Encyklopedia – wkrótce'); return false;">
          <span class="nav-icon">📚</span> Encyklopedia
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item btn-ghost" id="logout-side" style="width:100%">
          <span class="nav-icon">🚪</span> Wyloguj się
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
          <span class="topbar-title" id="topbar-title">Dodaj szlak</span>
        </div>
        <div class="topbar-actions">
          <div class="user-badge">
            <div class="user-avatar" id="user-avatar">A</div>
            <span class="user-email" id="user-email">ładowanie…</span>
          </div>
          <button class="btn btn-secondary btn-sm" id="logout-btn">Wyloguj</button>
        </div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <div>
            <h2 id="page-title">Dodaj szlak</h2>
            <p>Wypełnij poniższe pola i zapisz szlak do bazy danych.</p>
          </div>
          <a href="tours.html" class="btn btn-secondary">← Wróć do listy</a>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>Dane szlaku</h3>
          </div>
          <div class="card-body">
            <form id="tour-form" onsubmit="return false;">

              <!-- Nazwa -->
              <div class="form-group">
                <label for="name">Nazwa <span style="color:var(--danger-light)">*</span></label>
                <input type="text" id="name" placeholder="np. Szlak Zamków Warmii" />
              </div>

              <!-- Krótki opis -->
              <div class="form-group">
                <label for="short-description">
                  Krótki opis
                  <span class="char-counter" id="short-desc-counter">0/200</span>
                </label>
                <textarea id="short-description" maxlength="200" rows="3"
                  placeholder="Krótkie streszczenie szlaku…"></textarea>
              </div>

              <!-- Pełny opis -->
              <div class="form-group">
                <label for="description">Pełny opis</label>
                <textarea id="description" rows="6"
                  placeholder="Szczegółowy opis szlaku, atrakcje, wskazówki…"></textarea>
              </div>

              <!-- Trudność + Czas -->
              <div class="form-grid">
                <div class="form-group">
                  <label for="difficulty">Trudność</label>
                  <select id="difficulty">
                    <option value="">— brak —</option>
                    <option value="easy">Łatwy</option>
                    <option value="medium">Średni</option>
                    <option value="hard">Trudny</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="duration">Czas trwania (minuty)</label>
                  <input type="number" id="duration" min="0" placeholder="np. 120" />
                </div>
              </div>

              <!-- Dystans -->
              <div class="form-grid">
                <div class="form-group">
                  <label for="distance">Dystans (metry)</label>
                  <input type="number" id="distance" min="0" placeholder="np. 5000" />
                </div>
                <div></div>
              </div>

              <!-- Opublikowany -->
              <div class="form-check">
                <input type="checkbox" id="is-published" />
                <label for="is-published">Opublikowany (widoczny w aplikacji)</label>
              </div>

              <!-- Akcje -->
              <div class="form-actions">
                <button class="btn btn-primary" id="save-btn" type="button">
                  Zapisz szlak
                </button>
                <button class="btn btn-secondary" id="cancel-btn" type="button">
                  Anuluj
                </button>
              </div>

            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/add-tour.js"></script>
  <script>
    AddTour.init();
  </script>
</body>
</html>
