<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zabytkoza – Szlaki turystyczne</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="sidebar-logo">
          <div class="logo-icon">🏛️</div>
          <div class="sidebar-logo-text">
            <span class="app-name">Zabytkoza</span>
            <span class="app-sub">Panel administracyjny</span>
          </div>
        </a>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Nawigacja</div>

        <a href="dashboard.html" class="nav-item" data-page="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="monuments.html" class="nav-item" data-page="monuments">
          <span class="nav-icon">🏰</span> Zabytki
        </a>
        <a href="tours.html" class="nav-item" data-page="tours">
          <span class="nav-icon">🗺️</span> Szlaki
        </a>
        <a href="facts.html" class="nav-item" data-page="facts">
          <span class="nav-icon">💡</span> Ciekawostki
        </a>
        <a href="audio.html" class="nav-item" data-page="audio">
          <span class="nav-icon">🎵</span> Audio
        </a>
        <a href="encyclopedia.html" class="nav-item" data-page="encyclopedia">
          <span class="nav-icon">📚</span> Encyklopedia
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item btn-ghost" id="logout-side" style="width:100%">
          <span class="nav-icon">🚪</span> Wyloguj się
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
          <span class="topbar-title">Szlaki</span>
        </div>
        <div class="topbar-actions">
          <div class="user-badge">
            <div class="user-avatar" id="user-avatar">A</div>
            <span class="user-email" id="user-email">ładowanie…</span>
          </div>
          <button class="btn btn-secondary btn-sm" id="logout-btn">Wyloguj</button>
        </div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <div>
            <h2>Szlaki turystyczne</h2>
            <p id="count-label">Ładowanie listy…</p>
          </div>
          <a href="add-tour.html" class="btn btn-primary">+ Dodaj szlak</a>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>Lista szlaków</h3>
            <div class="filters-bar">
              <input
                type="search"
                class="search-input"
                id="search-input"
                placeholder="Szukaj po nazwie…"
                aria-label="Szukaj"
              />
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nazwa</th>
                  <th>Trudność</th>
                  <th>Czas</th>
                  <th>Dystans</th>
                  <th>Opublikowany</th>
                  <th>Akcje</th>
                </tr>
              </thead>
              <tbody id="tours-tbody">
                <tr class="loading-row">
                  <td colspan="6"><span class="spinner"></span>Ładowanie szlaków…</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tours.js"></script>
  <script src="js/ui.js"></script>
  <script>
    let searchQuery = '';

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderTable() {
      const filtered  = Tours.filterTours(searchQuery);
      const tbody     = document.getElementById('tours-tbody');
      const countLabel = document.getElementById('count-label');
      countLabel.textContent = `Wyświetlono ${filtered.length} rekordów`;

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Brak szlaków w bazie.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(t => {
        const diff = Tours.difficultyBadge(t.difficulty);
        return `
          <tr id="row-${t.id}">
            <td>${escHtml(t.name || '—')}</td>
            <td>
              ${diff.cls
                ? `<span class="badge ${diff.cls}">${escHtml(diff.label)}</span>`
                : `<span style="color:var(--text-muted)">—</span>`}
            </td>
            <td>${escHtml(Tours.formatDuration(t.duration_minutes))}</td>
            <td>${escHtml(Tours.formatDistance(t.distance_meters))}</td>
            <td>
              <label class="toggle" title="${t.is_published ? 'Kliknij aby ukryć' : 'Kliknij aby opublikować'}">
                <input
                  type="checkbox"
                  ${t.is_published ? 'checked' : ''}
                  onchange="handleToggle('${t.id}', ${t.is_published})"
                />
                <span class="toggle-slider"></span>
              </label>
            </td>
            <td>
              <div class="actions-cell">
                <a href="add-tour.html?id=${t.id}" class="btn btn-secondary btn-sm" title="Edytuj">
                  ✏️ Edytuj
                </a>
                <a href="tour-stops.html?id=${t.id}" class="btn btn-secondary btn-sm" title="Punkty szlaku">
                  📍 Punkty
                </a>
                <button
                  class="btn btn-danger btn-sm"
                  onclick="handleDelete('${t.id}')"
                  title="Usuń">
                  🗑️ Usuń
                </button>
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    async function handleDelete(id) {
      try {
        const deleted = await Tours.deleteTour(id);
        if (deleted) {
          renderTable();
          UI.showToast('Szlak został usunięty.', 'success');
        }
      } catch (err) {
        UI.showToast(`Błąd usuwania: ${err.message}`, 'error');
      }
    }

    async function handleToggle(id, currentStatus) {
      try {
        const newStatus = await Tours.togglePublish(id, currentStatus);
        UI.showToast(newStatus ? 'Szlak opublikowany.' : 'Szlak ukryty.', 'success');
        renderTable();
      } catch (err) {
        UI.showToast(`Błąd zmiany statusu: ${err.message}`, 'error');
        renderTable();
      }
    }

    (async () => {
      await Auth.checkAuth();
      UI.initSidebar('tours');
      await UI.populateUserBadge();

      try {
        await Tours.loadTours();
        renderTable();
      } catch (err) {
        UI.showToast(`Błąd pobierania szlaków: ${err.message}`, 'error');
        document.getElementById('tours-tbody').innerHTML =
          '<tr class="empty-row"><td colspan="6">Błąd ładowania danych z bazy.</td></tr>';
        document.getElementById('count-label').textContent = 'Błąd ładowania';
      }

      document.getElementById('search-input').addEventListener('input', e => {
        searchQuery = e.target.value;
        renderTable();
      });
    })();
  </script>
</body>
</html>
