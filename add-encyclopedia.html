<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zabytkoza – Dodaj artykuł</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="sidebar-logo">
          <div class="logo-icon">🏛️</div>
          <div class="sidebar-logo-text">
            <span class="app-name">Zabytkoza</span>
            <span class="app-sub">Panel administracyjny</span>
          </div>
        </a>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Nawigacja</div>

        <a href="dashboard.html" class="nav-item" data-page="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="monuments.html" class="nav-item" data-page="monuments">
          <span class="nav-icon">🏰</span> Zabytki
        </a>
        <a href="tours.html" class="nav-item" data-page="tours">
          <span class="nav-icon">🗺️</span> Szlaki
        </a>
        <a href="facts.html" class="nav-item" data-page="facts">
          <span class="nav-icon">💡</span> Ciekawostki
        </a>
        <a href="encyclopedia.html" class="nav-item" data-page="encyclopedia">
          <span class="nav-icon">📚</span> Encyklopedia
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item btn-ghost" id="logout-side" style="width:100%">
          <span class="nav-icon">🚪</span> Wyloguj się
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
          <span class="topbar-title" id="topbar-title">Dodaj artykuł</span>
        </div>
        <div class="topbar-actions">
          <div class="user-badge">
            <div class="user-avatar" id="user-avatar">A</div>
            <span class="user-email" id="user-email">ładowanie…</span>
          </div>
          <button class="btn btn-secondary btn-sm" id="logout-btn">Wyloguj</button>
        </div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <div>
            <h2 id="page-title">Dodaj artykuł</h2>
            <p>Wypełnij poniższe pola i zapisz artykuł do bazy danych.</p>
          </div>
          <a href="encyclopedia.html" class="btn btn-secondary">← Wróć do listy</a>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>Dane artykułu</h3>
          </div>
          <div class="card-body">
            <form id="encyclopedia-form" onsubmit="return false;">

              <!-- Tytuł -->
              <div class="form-group">
                <label for="title">Tytuł <span style="color:var(--danger-light)">*</span></label>
                <input type="text" id="title" placeholder="np. Zamek Lidzbarski – historia i architektura" />
              </div>

              <!-- Slug -->
              <div class="form-group">
                <label for="slug">Slug URL
                  <span style="font-size:11px; color:var(--text-muted); font-weight:400;">
                    (auto-generowany z tytułu, edytowalny)
                  </span>
                </label>
                <input type="text" id="slug" placeholder="np. zamek-lidzbarski-historia-i-architektura" />
              </div>

              <!-- Kategoria + Zabytek -->
              <div class="form-grid">
                <div class="form-group">
                  <label for="category">Kategoria</label>
                  <select id="category">
                    <option value="">— brak kategorii —</option>
                    <option value="Architektura">Architektura</option>
                    <option value="Historia">Historia</option>
                    <option value="Przyroda">Przyroda</option>
                    <option value="Kultura">Kultura</option>
                    <option value="Legendy">Legendy</option>
                    <option value="Inne">Inne</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="monument-id">Powiązany zabytek</label>
                  <select id="monument-id">
                    <option value="">— brak powiązania —</option>
                  </select>
                </div>
              </div>

              <!-- Treść -->
              <div class="form-group">
                <label for="content">
                  Treść artykułu <span style="color:var(--danger-light)">*</span>
                  <span style="font-size:11px; color:var(--text-muted); font-weight:400; margin-left:8px;">
                    obsługuje Markdown (# nagłówki, **pogrubienie**, *kursywa*, listy)
                  </span>
                </label>
                <textarea id="content" rows="12"
                  placeholder="Wpisz treść artykułu w formacie Markdown…"></textarea>
              </div>

              <!-- Zdjęcie okładki -->
              <div class="form-group">
                <label for="cover-image">Zdjęcie okładki artykułu</label>
                <input type="file" id="cover-image" accept="image/*">
                <div id="cover-image-preview" style="margin-top:8px; display:none;">
                  <img id="cover-image-img" style="max-width:300px; max-height:200px; border-radius:8px;">
                  <button type="button" id="remove-cover-image" style="display:block; margin-top:4px;">
                    Usuń zdjęcie
                  </button>
                </div>
                <div id="cover-image-existing" style="margin-top:8px; display:none;">
                  <p style="font-size:12px; color:#aaa;">Aktualne zdjęcie:</p>
                  <img id="cover-image-existing-img" style="max-width:300px; max-height:200px; border-radius:8px;">
                </div>
              </div>

              <!-- Opublikowany -->
              <div class="form-check">
                <input type="checkbox" id="is-published" checked />
                <label for="is-published">Opublikowany (widoczny w aplikacji)</label>
              </div>

              <!-- Akcje -->
              <div class="form-actions">
                <button class="btn btn-primary" id="save-btn" type="button">
                  Zapisz artykuł
                </button>
                <button class="btn btn-secondary" id="cancel-btn" type="button">
                  Anuluj
                </button>
              </div>

            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/add-encyclopedia.js"></script>
  <script>
    AddEncyclopedia.init();
  </script>
</body>
</html>
