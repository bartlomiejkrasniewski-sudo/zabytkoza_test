<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zabytkoza – Audioprzewodniki</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="sidebar-logo">
          <div class="logo-icon">🏛️</div>
          <div class="sidebar-logo-text">
            <span class="app-name">Zabytkoza</span>
            <span class="app-sub">Panel administracyjny</span>
          </div>
        </a>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Nawigacja</div>

        <a href="dashboard.html" class="nav-item" data-page="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="monuments.html" class="nav-item" data-page="monuments">
          <span class="nav-icon">🏰</span> Zabytki
        </a>
        <a href="tours.html" class="nav-item" data-page="tours">
          <span class="nav-icon">🗺️</span> Szlaki
        </a>
        <a href="facts.html" class="nav-item" data-page="facts">
          <span class="nav-icon">💡</span> Ciekawostki
        </a>
        <a href="audio.html" class="nav-item" data-page="audio">
          <span class="nav-icon">🎵</span> Audio
        </a>
        <a href="encyclopedia.html" class="nav-item" data-page="encyclopedia">
          <span class="nav-icon">📚</span> Encyklopedia
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item btn-ghost" id="logout-side" style="width:100%">
          <span class="nav-icon">🚪</span> Wyloguj się
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
          <span class="topbar-title">Audioprzewodniki</span>
        </div>
        <div class="topbar-actions">
          <div class="user-badge">
            <div class="user-avatar" id="user-avatar">A</div>
            <span class="user-email" id="user-email">ładowanie…</span>
          </div>
          <button class="btn btn-secondary btn-sm" id="logout-btn">Wyloguj</button>
        </div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <div>
            <h2>Audioprzewodniki</h2>
            <p id="count-label">Ładowanie listy…</p>
          </div>
          <a href="add-audio.html" class="btn btn-primary">+ Dodaj nagranie</a>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>Lista nagrań</h3>
            <div class="filters-bar">
              <select id="monument-filter" class="search-input" style="width:auto;min-width:200px">
                <option value="">— wszystkie zabytki —</option>
              </select>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Tytuł</th>
                  <th>Zabytek</th>
                  <th>Czas trwania</th>
                  <th>Kolejność</th>
                  <th>Opublikowany</th>
                  <th>Akcje</th>
                </tr>
              </thead>
              <tbody id="audio-tbody">
                <tr class="loading-row">
                  <td colspan="6"><span class="spinner"></span>Ładowanie nagrań…</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ui.js"></script>
  <script>
    let selectedMonumentId = '';
    let allMonuments = [];

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderTable() {
      const filtered   = Audio.filterByMonument(selectedMonumentId);
      const tbody      = document.getElementById('audio-tbody');
      const countLabel = document.getElementById('count-label');
      countLabel.textContent = `Wyświetlono ${filtered.length} rekordów`;

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Brak nagrań w bazie.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(a => {
        const title    = escHtml(a.title || '');
        const monument = a.monuments?.name
          ? escHtml(a.monuments.name)
          : '<span style="color:var(--text-muted)">—</span>';
        const duration = escHtml(Audio.formatDuration(a.duration_seconds));
        return `
          <tr id="row-${a.id}">
            <td>${title}</td>
            <td>${monument}</td>
            <td>${duration}</td>
            <td>${a.sort_order ?? 0}</td>
            <td>
              <label class="toggle" title="${a.is_published ? 'Kliknij aby ukryć' : 'Kliknij aby opublikować'}">
                <input
                  type="checkbox"
                  ${a.is_published ? 'checked' : ''}
                  onchange="handleToggle('${a.id}', ${a.is_published})"
                />
                <span class="toggle-slider"></span>
              </label>
            </td>
            <td>
              <div class="actions-cell">
                <a href="add-audio.html?id=${a.id}" class="btn btn-secondary btn-sm" title="Edytuj">
                  ✏️ Edytuj
                </a>
                <button
                  class="btn btn-danger btn-sm"
                  onclick="handleDelete('${a.id}')"
                  title="Usuń">
                  🗑️ Usuń
                </button>
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    async function handleDelete(id) {
      try {
        const deleted = await Audio.deleteAudio(id);
        if (deleted) {
          renderTable();
          UI.showToast('Nagranie zostało usunięte.', 'success');
        }
      } catch (err) {
        UI.showToast(`Błąd usuwania: ${err.message}`, 'error');
      }
    }

    async function handleToggle(id, currentStatus) {
      try {
        const newStatus = await Audio.togglePublish(id, currentStatus);
        UI.showToast(newStatus ? 'Nagranie opublikowane.' : 'Nagranie ukryte.', 'success');
        renderTable();
      } catch (err) {
        UI.showToast(`Błąd zmiany statusu: ${err.message}`, 'error');
        renderTable();
      }
    }

    function populateMonumentFilter(audioList) {
      const seen = new Map();
      audioList.forEach(a => {
        if (a.monument_id && a.monuments?.name) {
          seen.set(String(a.monument_id), a.monuments.name);
        }
      });

      const select = document.getElementById('monument-filter');
      seen.forEach((name, id) => {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = name;
        select.appendChild(opt);
      });
    }

    (async () => {
      await Auth.checkAuth();
      UI.initSidebar('audio');
      await UI.populateUserBadge();

      try {
        const list = await Audio.loadAudio();
        populateMonumentFilter(list);
        renderTable();
      } catch (err) {
        UI.showToast(`Błąd pobierania nagrań: ${err.message}`, 'error');
        document.getElementById('audio-tbody').innerHTML =
          '<tr class="empty-row"><td colspan="6">Błąd ładowania danych z bazy.</td></tr>';
        document.getElementById('count-label').textContent = 'Błąd ładowania';
      }

      document.getElementById('monument-filter').addEventListener('change', e => {
        selectedMonumentId = e.target.value;
        renderTable();
      });
    })();
  </script>
</body>
</html>
